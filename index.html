<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:#09090b;color:#fafafa;min-height:100vh}

/* Header */
.hdr{max-width:1280px;margin:0 auto;padding:40px 32px 0}
.hdr h1{font-size:32px;font-weight:800;letter-spacing:-0.5px;background:linear-gradient(135deg,#3b82f6,#8b5cf6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr p{color:#71717a;font-size:14px;margin-top:4px}
.hdr-row{display:flex;align-items:center;justify-content:space-between;margin-top:20px;flex-wrap:wrap;gap:12px}
.pills{display:flex;gap:4px;background:#18181b;padding:3px;border-radius:10px}
.pill{padding:7px 16px;border-radius:8px;border:none;background:transparent;color:#71717a;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.pill:hover{color:#a1a1aa}
.pill.on{background:#27272a;color:#fafafa}
.prog{display:flex;align-items:center;gap:10px}
.prog-text{font-size:13px;color:#71717a;font-weight:500}
.prog-text b{color:#22c55e}
.prog-bar{width:120px;height:4px;background:#27272a;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#22c55e;border-radius:2px;transition:width .3s}

/* Grid */
.grid{max-width:1280px;margin:24px auto;padding:0 32px 60px;display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:16px}

/* Card */
.card{background:#18181b;border:1px solid #27272a;border-radius:16px;padding:24px;transition:all .2s;position:relative}
.card:hover{border-color:#3f3f46;transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.3)}
.card-niche{font-size:11px;font-weight:600;color:#a78bfa;background:#a78bfa15;padding:3px 10px;border-radius:6px;display:inline-block;margin-bottom:12px}
.card-name{font-size:20px;font-weight:700;color:#fafafa;margin-bottom:4px;letter-spacing:-0.3px}
.card-pub{font-size:12px;color:#52525b;margin-bottom:16px}
.card-pub span{color:#71717a}

.stats{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:0;background:#09090b;border-radius:12px;overflow:hidden;margin-bottom:16px}
.stat{padding:14px 12px;text-align:center;border-right:1px solid #18181b}
.stat:last-child{border-right:none}
.stat-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.8px;color:#52525b;margin-bottom:4px}
.stat-val{font-size:18px;font-weight:800;color:#fafafa}
.stat-val.blue{color:#3b82f6}
.stat-val.green{color:#22c55e}
.stat-val.amber{color:#f59e0b}

.card-foot{display:flex;align-items:center;justify-content:space-between;gap:8px}
.detail-btn{padding:8px 16px;border-radius:8px;border:1px solid #3f3f46;background:transparent;color:#a1a1aa;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .15s}
.detail-btn:hover{background:#27272a;color:#fafafa;border-color:#52525b}
.vote-pills{display:flex;gap:4px}
.vp{width:36px;height:28px;border-radius:6px;border:1px solid #27272a;background:transparent;cursor:pointer;font-size:13px;transition:all .15s;display:flex;align-items:center;justify-content:center}
.vp:hover{border-color:#52525b;background:#27272a}
.vp.good.sel{background:#16a34a;border-color:#16a34a;color:#fff}
.vp.maybe.sel{background:#d97706;border-color:#d97706;color:#fff}
.vp.bad.sel{background:#dc2626;border-color:#dc2626;color:#fff}
.vp .ico{font-size:14px;line-height:1}

/* Badge on card */
.card-badge{position:absolute;top:16px;right:16px;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.card-badge.good{background:#16a34a22;color:#4ade80}
.card-badge.maybe{background:#d9770622;color:#fbbf24}
.card-badge.bad{background:#dc262622;color:#f87171}

/* Comment inline */
.card-comment{margin-top:10px;display:none}
.card-comment.show{display:block}
.card-comment textarea{width:100%;background:#09090b;border:1px solid #27272a;color:#d4d4d8;padding:8px 12px;border-radius:8px;font-size:12px;font-family:inherit;resize:none;height:40px;transition:border-color .15s}

.save-dot{font-size:10px;color:#22c55e;margin-top:3px;min-height:14px}

.modal-bg.open{display:flex;align-items:center;justify-content:center}

.modal-close:hover{background:#27272a;color:#fafafa}

.modal .stats{margin-bottom:24px}

.m-text{font-size:14px;color:#a1a1aa;line-height:1.7}
.m-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-cell{background:#09090b;padding:14px;border-radius:10px}
.m-cell-label{font-size:10px;font-weight:600;color:#52525b;text-transform:uppercase;letter-spacing:.5px}
.m-cell-val{font-size:13px;color:#d4d4d8;margin-top:3px;word-break:break-all}
.m-cell-val a{color:#3b82f6;text-decoration:none}
.m-cell-val a:hover{text-decoration:underline}
.m-links{display:flex;gap:8px;margin-bottom:24px}
.m-link{padding:8px 18px;border-radius:8px;background:#27272a;color:#d4d4d8;text-decoration:none;font-size:12px;font-weight:600;transition:all .15s}

const BLOB="019d787b-2ce2-7dd5-9a55-e1e301f14b2c";
let R={},F='all';

function fmt(n){if(n>=1e9)return'$'+(n/1e9).toFixed(1)+'B';if(n>=1e6)return'$'+(n/1e6).toFixed(1)+'M';if(n>=1e3)return'$'+(n/1e3).toFixed(0)+'K';return'$'+n}
function fg(n){if(n>=10000)return'+'+(n/1000).toFixed(0)+'K%';if(n>=1000)return'+'+(n/1000).toFixed(1)+'K%';return'+'+n+'%'}
function fs(b){if(!b)return'N/A';if(b>=1e6)return(b/1e6).toFixed(0)+'MB';return(b/1e3).toFixed(0)+'KB'}
function fd(n){if(n>=1e9)return(n/1e9).toFixed(1)+'B';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(0)+'K';return n}
function e(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

function sf(f){F=f;document.querySelectorAll('.pill').forEach(b=>b.classList.toggle('on',b.dataset.f===f));render()}
function gf(){if(F==='all')return A;if(F==='unreviewed')return A.filter(a=>!R[a.id]?.vote);return A.filter(a=>R[a.id]?.vote===F)}

function render(){
  const apps=gf(),c=Object.values(R).filter(r=>r.vote).length;
  document.getElementById('pc').textContent=c;
  document.getElementById('pb').style.width=(c/A.length*100)+'%';
  if(!apps.length){document.getElementById('grid').innerHTML='<div class="empty">No apps in this view</div>';return}
  document.getElementById('grid').innerHTML=apps.map(a=>{
    const r=R[a.id]||{},v=r.vote||'';
    const badge=v?`<div class="card-badge ${v}">${v==='good'?'BUILD':v==='maybe'?'MAYBE':'PASS'}</div>`:'';
    const hasComment=r.comment||v;
    return`<div class="card">
      ${badge}
      <div class="card-niche">${e(a.niche)}</div>
      <div class="card-name">${e(a.name)}</div>
      <div class="card-pub"><span>${e(a.publisher)}</span> &middot; ${a.rating?a.rating.toFixed(1)+'&#9733;':'N/A'} &middot; ${e(a.genres)}</div>
      <div class="stats">
        <div class="stat"><div class="stat-label">Revenue</div><div class="stat-val blue">${fmt(a.rev_2024)}</div></div>
        <div class="stat"><div class="stat-label">YoY Growth</div><div class="stat-val green">${fg(a.yoy_growth)}</div></div>
        <div class="stat"><div class="stat-label">Rating</div><div class="stat-val">${a.rating?a.rating.toFixed(1):'—'}</div></div>
        <div class="stat"><div class="stat-label">Size</div><div class="stat-val">${fs(a.size)}</div></div>
      </div>
      <div class="card-foot">
        <button class="detail-btn" onclick="openModal('${a.id}')">View Details</button>
        <div class="vote-pills">
          <button class="vp good ${v==='good'?'sel':''}" onclick="vo('${a.id}','good')" title="Build this"><span class="ico">&#x2714;</span></button>
          <button class="vp maybe ${v==='maybe'?'sel':''}" onclick="vo('${a.id}','maybe')" title="Maybe"><span class="ico">&#x2753;</span></button>
          <button class="vp bad ${v==='bad'?'sel':''}" onclick="vo('${a.id}','bad')" title="Pass"><span class="ico">&#x2716;</span></button>
        </div>
      </div>
      <div class="card-comment ${hasComment?'show':''}" id="cc-${a.id}">
        <textarea placeholder="Quick note..." oninput="sc('${a.id}',this.value)">${e(r.comment||'')}</textarea>
        <div class="save-dot" id="sv-${a.id}"></div>
      </div>
    </div>`}).join('');
}

function vo(id,v){
  event.stopPropagation();
  if(!R[id])R[id]={};
  R[id].vote=R[id].vote===v?null:v;
  // Show comment box when voted
  const cc=document.getElementById('cc-'+id);
  if(cc)cc.classList.toggle('show',!!R[id].vote);
  sv();render();
}
let T={};
function sc(id,val){clearTimeout(T[id]);T[id]=setTimeout(()=>{if(!R[id])R[id]={};R[id].comment=val;sv()},800)}

function openModal(id){
  const a=A.find(x=>x.id===id);if(!a)return;
  const r=R[a.id]||{},v=r.vote||'';
  const st=a.store_link||(a.android_id?'https://play.google.com/store/apps/details?id='+a.android_id:'');
  const io=a.ios_store_link||(a.ios_id?'https://apps.apple.com/app/id'+a.ios_id:'');
  let ih='';
  if(a.iaps&&a.iaps.length){
    ih=`<div class="m-section"><div class="m-title">In-App Purchases (${a.iaps.length})</div><table class="m-iap"><tr><th>Name</th><th>Price</th><th>Type</th><th>Period</th></tr>`+
    a.iaps.map(i=>`<tr><td>${e(i.name)}</td><td>${i.price?'$'+i.price:'Free'} ${(i.currency||'').toUpperCase()}</td><td>${i.is_subscription?'<span class="badge-s badge-sub">Subscription</span>':'One-time'}${i.has_free_trial?'<span class="badge-s badge-tri">Free Trial</span>':''}</td><td>${i.period||'—'}</td></tr>`).join('')+'</table></div>';
  }
  document.getElementById('modal').innerHTML=`
    <div class="modal-head">
      <button class="modal-close" onclick="closeModal()">&times;</button>
      <div class="card-niche">${e(a.niche)}</div>
      <h2>${e(a.name)}</h2>
      <div class="genres">${e(a.genres)}</div>
    </div>
    <div class="modal-body">
      <div class="stats">
        <div class="stat"><div class="stat-label">Revenue 2024</div><div class="stat-val blue">${fmt(a.rev_2024)}</div></div>
        <div class="stat"><div class="stat-label">YoY Growth</div><div class="stat-val green">${fg(a.yoy_growth)}</div></div>
        <div class="stat"><div class="stat-label">Rating</div><div class="stat-val">${a.rating?a.rating.toFixed(1):'—'}</div></div>
        <div class="stat"><div class="stat-label">App Size</div><div class="stat-val">${fs(a.size)}</div></div>
      </div>
      <div class="m-links">
        ${st?`<a class="m-link" href="${st}" target="_blank">&#9654; Google Play</a>`:''}
        ${io?`<a class="m-link" href="${io}" target="_blank">&#63743; App Store</a>`:''}
        ${a.apptweak_link?`<a class="m-link" href="${a.apptweak_link}" target="_blank">&#128200; AppTweak</a>`:''}
      </div>
      ${a.short_desc?`<div class="m-section"><div class="m-title">Summary</div><div class="m-text">${e(a.short_desc)}</div></div>`:''}
      ${a.description?`<div class="m-section"><div class="m-title">Full Description</div><div class="m-text">${e(a.description)}</div></div>`:''}
      <div class="m-section"><div class="m-title">Publisher Details</div>
        <div class="m-grid">
          <div class="m-cell"><div class="m-cell-label">Company</div><div class="m-cell-val">${e(a.publisher)||'N/A'}</div></div>
          <div class="m-cell"><div class="m-cell-label">Headquarters</div><div class="m-cell-val">${a.publisher_hq?a.publisher_hq.toUpperCase():'N/A'}</div></div>
          <div class="m-cell"><div class="m-cell-label">Email</div><div class="m-cell-val">${a.publisher_email?`<a href="mailto:${e(a.publisher_email)}">${e(a.publisher_email)}</a>`:'N/A'}</div></div>
          <div class="m-cell"><div class="m-cell-label">Website</div><div class="m-cell-val">${a.publisher_website?`<a href="${a.publisher_website.startsWith('http')?'':'https://'}${a.publisher_website}" target="_blank">${e(a.publisher_website)}</a>`:'N/A'}</div></div>
          <div class="m-cell"><div class="m-cell-label">Released</div><div class="m-cell-val">${a.release_date?a.release_date.split(' ')[0]:'N/A'}</div></div>
          <div class="m-cell"><div class="m-cell-label">Pricing Model</div><div class="m-cell-val">${a.is_free?'Free with In-App Purchases':'Paid'}</div></div>
          <div class="m-cell"><div class="m-cell-label">Android Package</div><div class="m-cell-val">${e(a.android_id)||'N/A'}</div></div>
          <div class="m-cell"><div class="m-cell-label">iOS App ID</div><div class="m-cell-val">${e(a.ios_id)||'N/A'}</div></div>
        </div>
      </div>
      ${ih}
    </div>`;
  document.getElementById('mbg').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){document.getElementById('mbg').classList.remove('open');document.body.style.overflow=''}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal()});

let saving=false,queued=false;
async function sv(){
  if(saving){queued=true;return}saving=true;
  try{await fetch('https://jsonblob.com/api/jsonBlob/'+BLOB,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(R)});
    document.querySelectorAll('.save-dot').forEach(el=>{if(el.parentElement.classList.contains('show')){el.textContent='\u2713 Saved';setTimeout(()=>el.textContent='',1500)}});
  }catch(e){console.error(e)}
  saving=false;if(queued){queued=false;sv()}
}
async function load(){
  try{const r=await fetch('https://jsonblob.com/api/jsonBlob/'+BLOB);R=await r.json()}catch(e){R={}}
  render();
}
load();
</script>
